<!DOCTYPE html>
<html>
<head>
    <title>Student Directory</title>
</head>
<body>

    <h1>Student Directory</h1>

    <div id="studentsList"></div>

    <script>
        function loadStudents() {
            fetch("http://localhost:8080/student-portfolio-manager/api/students")
                .then(res => res.json())
                .then(data => {
                    let list = "";

                    data.forEach(student => {
                        list += `
                            <div style="
                                border:1px solid #ccc;
                                padding:15px;
                                margin:10px;
                                border-radius:10px;
                                width:250px;
                                display:inline-block;
                                cursor:pointer;
                            ">
                                <h3>${student.fullName}</h3>
                                <p><b>${student.department}</b></p>
                                <p>${student.shortBio}</p>
                                <p><b>Main Skill:</b> ${student.mainSkill}</p>
                            </div>
                        `;
                    });

                    document.getElementById("studentsList").innerHTML = list;
                });
        }

        // Sayfa açılır açılmaz çalışır
        window.onload = loadStudents;
    </script>

</body>
</html>
